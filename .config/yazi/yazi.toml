[opener]
image_viewer = [
    { run = 'feh --scale-down --auto-zoom --image-bg "#1E1E2E" "$@"', orphan = true, desc = "feh" }
]
audio_player = [
    { run = 'deadbeef "$@"', orphan = true, desc = "DeaDBeeF" }
]
video_player = [
    { run = 'vlc "$@"', orphan = true, desc = "VLC" }
]
sioyek = [
    { run = 'sioyek "$@"', orphan = true, desc = "Open in Sioyek" }
]
excel = [
    { run = 'localc "$@"', orphan = true, desc = "Open in LibreOffice Calc" }
]

[open]
prepend_rules = [
    { mime = "image/*", use = "image_viewer" },
    { mime = "audio/*", use = "audio_player" },
    { mime = "video/*", use = "video_player" },
    { mime = "application/pdf", use = "sioyek" },
    { name = "*.xlsx", use = "excel" },
    { name = "*.xls",  use = "excel" },
    { name = "*.csv",  use = "excel"}
]
