# --- MODERN RENDERING BACKEND ---
backend = "glx";
vsync = true;
use-damage = true;
glx-copy-from-front = false;

# Corner and Opacity detection
detect-rounded-corners = true;
detect-client-opacity = true;


# --- ROUNDED CORNERS ---
# Set the global radius to match your Rofi menu
corner-radius = 8;

# Do not round the status bar, desktop background, or fullscreen windows
rounded-corners-exclude = [
    "window_type = 'desktop'",
    "_NET_WM_STATE@:a *= '_NET_WM_STATE_FULLSCREEN'"
];

# --- ANIMATIONS ---
# Smooth fade-in/fade-out effect when opening/closing windows
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- BLUR ---
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;

# Don't blur the screen behind the desktop or status bar
blur-background-exclude = [
    "window_type = 'desktop'",
    "class_g = 'xmobar'",
    "window_type = 'dock'",
    "_GTK_FRAME_EXTENTS@:c",       # CRITICAL: Fixes weird boxes around GTK shadows
    "class_g = 'slop'"             # Prevents blur loops when using screenshot tools
];

# --- OPACITY RULES ---
opacity-rule = [
    # --- File Managers & Dialogs ---
    "75:class_g = 'Thunar'",
    "75:window_type = 'dialog'",        # <--- This catches Browser Uploads & Flameshot Saves!

    # --- System Tools ---
    "75:class_g = 'Blueman-manager'",   # Bluetooth
    "75:class_g = 'Pavucontrol'",       # Volume Controller (assuming you use pavucontrol)
    "75:class_g = 'nm-connection-editor'", # Network Manager GUI
    
    # --- Applications ---
    "85:class_g = 'Spotify'",           # Spotify
    "75:class_g = 'Code'",              # VS Code
    "75:class_g = 'Deadbeef'",          # DeaDBeeF

    # --- Opaque Exceptions ---
    "100:class_g = 'firefox'",          # Keep main browser solid
    "100:class_g = 'vlc'"               # Keep video player solid
];
