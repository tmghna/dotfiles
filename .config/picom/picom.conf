# --- MODERN RENDERING BACKEND ---
backend = "glx";
vsync = true;
use-damage = true;
glx-copy-from-front = false;

# Corner and Opacity detection
detect-rounded-corners = true;
detect-client-opacity = true;

# --- SHADOWS ---
# Enable sleek drop shadows, but strictly forbid them on Rofi and Xmobar
shadow = true;
shadow-radius = 15;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-opacity = 0.4;

shadow-exclude = [
    "class_g = 'Rofi'",
    "class_g = 'xmobar'"
];

# --- ROUNDED CORNERS ---
# Set the global radius to match your Rofi menu
corner-radius = 8;

# Do not round the status bar, desktop background, or fullscreen windows
rounded-corners-exclude = [
    "class_g = 'xmobar'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_NET_WM_STATE@:a *= '_NET_WM_STATE_FULLSCREEN'"
];

# --- ANIMATIONS ---
# Smooth fade-in/fade-out effect when opening/closing windows
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- BLUR ---
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;

# Don't blur the screen behind the desktop or status bar
blur-background-exclude = [
    "window_type = 'desktop'",
    "class_g = 'xmobar'"
];
